name: prism/parse.y
on:
  push:
    paths-ignore:
      - 'doc/**'
      - '**/man/*'
      - '**.md'
      - '**.rdoc'
      - '**/.document'
      - '.*.yml'
  pull_request:
    paths-ignore:
      - 'doc/**'
      - '**/man/*'
      - '**.md'
      - '**.rdoc'
      - '**/.document'
      - '.*.yml'
  merge_group:

concurrency:
  group: ${{ github.workflow }} / ${{ startsWith(github.event_name, 'pull') && github.ref_name || github.sha }}
  cancel-in-progress: ${{ startsWith(github.event_name, 'pull') }}

permissions:
  contents: read

jobs:
  make:
    strategy:
      matrix:
        include:
          # `check` less test-syntax-suggest, whose specs assert which lines
          # the parser blames for a syntax error: the backend's recovery does
          # not reproduce that yet (44 of its 170 examples).
          - test_task: test test-tool test-all test-spec
      fail-fast: false

    env:
      GITPULLOPTIONS: --no-tags origin ${{ github.ref }}
      RUBY_DEBUG: ci

    runs-on: ubuntu-22.04

    if: >-
      ${{!(false
      || contains(github.event.head_commit.message, '[DOC]')
      || contains(github.event.pull_request.title, '[DOC]')
      || contains(github.event.pull_request.labels.*.name, 'Documentation')
      || (github.event.pull_request.user.login == 'dependabot[bot]')
      )}}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          sparse-checkout-cone-mode: false
          sparse-checkout: /.github
          persist-credentials: false

      - uses: ./.github/actions/setup/ubuntu

      - uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          ruby-version: '3.1'
          bundler: none

      - uses: ./.github/actions/setup/directories
        with:
          srcdir: src
          builddir: build
          makeup: true
          clean: true
          dummy-files: ${{ matrix.test_task == 'check' }}
          bundled-gems-src-cache: ${{ matrix.test_task == 'test-bundled-gems' }}

      # --with-parser=prism/parse.y implies --enable-prism-parsey, which is
      # what builds the generated parser and links it in.
      - name: Run configure
        run: ../src/configure -C --disable-install-doc cppflags=-DRUBY_DEBUG --with-parser=prism/parse.y

      - run: make

      - run: make TESTRUN_SCRIPT='-renvutil -v -e "exit EnvUtil.current_parser == %[prism/parse.y]"' run
        env:
          RUNOPT0: -I$(tooldir)/lib

      - name: make ${{ matrix.test_task }}
        run: make -s ${{ matrix.test_task }} RUN_OPTS="$RUN_OPTS" SPECOPTS="$SPECOPTS"
        env:
          RUBY_TESTOPTS: ${{ matrix.testopts }}
          RUN_OPTS: ${{ matrix.run_opts || '--parser=prism/parse.y' }}
          SPECOPTS: ${{ matrix.specopts || '-T --parser=prism/parse.y' }}
          TEST_BUNDLED_GEMS_ALLOW_FAILURES: ''

      - uses: ./.github/actions/slack
        with:
          label: ${{ matrix.run_opts }}
          SLACK_WEBHOOK_URL: ${{ secrets.SIMPLER_ALERTS_URL }} # ruby-lang slack: ruby/simpler-alerts-bot
        if: ${{ failure() }}

defaults:
  run:
    working-directory: build
